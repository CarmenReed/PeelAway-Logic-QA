name: Doc Quality Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  doc-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run doc-lint
        run: node scripts/doc-lint.js
